# Render Blueprint — Cribs Command Center Mockup
# Deploy this to Render via "New Blueprint" option

services:
  - type: web
    name: cribs-command-center
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8080
    healthCheckPath: /
    autoDeploy: true
